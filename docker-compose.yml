services:
  docchat:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - docchat-data:/app/data       # Persist ChromaDB index
      - ./my_docs:/app/docs:ro       # Mount documents (read-only)
      - ./prompts:/app/prompts:ro    # Mount prompt templates
    env_file: .env
    environment:
      - DOCCHAT_DATA_DIR=/app/data
      - DOCCHAT_UPLOAD_DIR=/app/data/uploads
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  docchat-data:
    driver: local
