<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocChat AI Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --user-bubble: #6366f1;
            --ai-bubble: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Glassmorphism Container */
        .app-container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.4);
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header h1 span {
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #ef4444; /* Red by default */
            border-radius: 50%;
            box-shadow: 0 0 10px #ef4444;
            transition: all 0.3s ease;
        }
        .status-dot.online {
            background-color: #10b981;
            box-shadow: 0 0 10px #10b981;
        }

        /* Chat Area */
        .chat-box {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        /* Scrollbar styles */
        .chat-box::-webkit-scrollbar {
            width: 6px;
        }
        .chat-box::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-box::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        /* Messages */
        .message {
            display: flex;
            gap: 16px;
            max-width: 85%;
            animation: slideUp 0.4s ease forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            flex-shrink: 0;
            background: var(--glass-border);
        }

        .message.user .avatar {
            background: var(--primary);
        }

        .bubble {
            padding: 14px 20px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.6;
            position: relative;
        }

        .message.ai .bubble {
            background: var(--ai-bubble);
            border: 1px solid var(--glass-border);
            border-top-left-radius: 4px;
        }

        .message.user .bubble {
            background: var(--user-bubble);
            border-top-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        /* Sources formatting */
        .sources {
            margin-top: 10px;
            font-size: 0.8rem;
            color: var(--text-muted);
            border-top: 1px solid var(--glass-border);
            padding-top: 8px;
        }

        .source-badge {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 6px;
            margin-top: 4px;
        }

        /* Loading Indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 4px;
        }
        .typing-indicator span {
            width: 6px;
            height: 6px;
            background-color: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Input Area */
        .input-area {
            padding: 20px 30px;
            background: rgba(15, 23, 42, 0.6);
            border-top: 1px solid var(--glass-border);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px 60px 16px 20px;
            color: white;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        input::placeholder {
            color: var(--text-muted);
        }

        button {
            position: absolute;
            right: 8px;
            background: var(--primary);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background: var(--primary-hover);
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        button svg {
            width: 18px;
            height: 18px;
            fill: white;
        }
        
        button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- HEADER -->
        <header>
            <h1><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><defs><linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" /><stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" /></linearGradient></defs><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg> <span>DocChat AI</span></h1>
            <div class="status">
                <div id="status-dot" class="status-dot"></div>
                <span id="status-text">Đang kiểm tra API...</span>
            </div>
        </header>

        <!-- CHAT BOX -->
        <main id="chat-box" class="chat-box">
            <!-- Default Welcome Message -->
            <div class="message ai">
                <div class="avatar">✨</div>
                <div class="bubble">
                    Xin chào! Tôi là DocChat. Hệ thống giao diện (Web) đã được kết nối thành công. Bạn hãy đặt câu hỏi về các tài liệu đã nạp nhé!
                </div>
            </div>
        </main>

        <!-- INPUT BOX -->
        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Hỏi bất cứ điều gì về tài liệu của bạn..." autocomplete="off" />
                <button id="send-btn">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- LOGIC (JAVASCRIPT) -->
    <script>
        const API_URL = "http://localhost:8000";
        
        const chatBox = document.getElementById("chat-box");
        const userInput = document.getElementById("user-input");
        const sendBtn = document.getElementById("send-btn");
        const statusDot = document.getElementById("status-dot");
        const statusText = document.getElementById("status-text");

        // 1. Kiểm tra kết nối API lúc mới vào web
        async function checkHealth() {
            try {
                const res = await fetch(`${API_URL}/health`);
                if (res.ok) {
                    statusDot.classList.add("online");
                    statusText.innerText = "API Đã Kết Nối";
                } else {
                    throw new Error("Bad status");
                }
            } catch (err) {
                statusDot.classList.remove("online");
                statusText.innerText = "Mất kết nối API";
            }
        }
        checkHealth();

        // 2. Hàm thêm tin nhắn vào màn hình
        function appendMessage(sender, text, sources = []) {
            const msgDiv = document.createElement("div");
            msgDiv.className = `message ${sender}`;
            
            const avatarDiv = document.createElement("div");
            avatarDiv.className = "avatar";
            avatarDiv.innerText = sender === "user" ? "👤" : "✨";

            const bubbleDiv = document.createElement("div");
            bubbleDiv.className = "bubble";
            bubbleDiv.innerText = text;

            // Nếu có source thì hiển thị thêm ở dưới bong bóng
            if (sources.length > 0) {
                const sourceDiv = document.createElement("div");
                sourceDiv.className = "sources";
                sourceDiv.innerText = "📚 Nguồn trích xuất: ";
                sources.forEach(src => {
                    const badge = document.createElement("span");
                    badge.className = "source-badge";
                    badge.innerText = src;
                    sourceDiv.appendChild(badge);
                });
                bubbleDiv.appendChild(sourceDiv);
            }

            msgDiv.appendChild(avatarDiv);
            msgDiv.appendChild(bubbleDiv);
            chatBox.appendChild(msgDiv);
            
            // Tự động cuộn xuống cùng
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Hàm tạo bong bóng hiển thị "đang gõ"
        function appendTyping() {
            const msgDiv = document.createElement("div");
            msgDiv.className = "message ai typing-msg";
            msgDiv.id = "typing-indicator";
            
            msgDiv.innerHTML = `
                <div class="avatar">✨</div>
                <div class="bubble">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function removeTyping() {
            const typingMsg = document.getElementById("typing-indicator");
            if (typingMsg) typingMsg.remove();
        }

        // 3. Hàm gửi câu hỏi sang API
        async function askQuestion() {
            const text = userInput.value.trim();
            if (!text) return;

            // Xóa ô input và khóa nút gửi
            userInput.value = "";
            sendBtn.disabled = true;

            // Hiện câu hỏi của user
            appendMessage("user", text);
            
            // Hiện icon AI đang suy nghĩ
            appendTyping();

            try {
                // Đóng gói HTTP Request
                const response = await fetch(`${API_URL}/ask`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        query: text,
                        top_k: 5,
                        provider: "openai", // Thay đổi nếu bạn xài anthropic
                        temperature: 0.7
                    })
                });

                removeTyping();

                if (!response.ok) {
                    const err = await response.json();
                    appendMessage("ai", `Lỗi từ Server: ${err.detail}`);
                } else {
                    // Lấy câu trả lời và in ra
                    const data = await response.json();
                    appendMessage("ai", data.answer, data.sources);
                }
            } catch (err) {
                removeTyping();
                appendMessage("ai", "Không thể kết nối đến máy chủ. Hãy chắc chắn bạn đã chạy lệnh 'uv run docchat-api'.");
            } finally {
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        // Bắt sự kiện Click nút gửi
        sendBtn.addEventListener("click", askQuestion);

        // Bắt sự kiện nhấn Enter
        userInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                askQuestion();
            }
        });
    </script>
</body>
</html>
